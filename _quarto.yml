project:
  type: book

profile:
  group:
    - [html, pdf]
  default: html

book:
  title: "FLIM Playground"
  author: "Wenxuan Zhao"
  date: "7/30/2025"
  repo-url: https://github.com/skalalab/flim_playground_doc
  repo-actions: [edit, issue]

bibliography: references.bib
csl: https://www.zotero.org/styles/nature

format:
  html:
    theme:
      light: [flatly, brand]
      dark: [darkly, brand]
    number-sections: true
    number-depth: 3
    citations-hover: true
    footnotes-hover: true
    include-after-body: giscus.html
    reference-location: document
  pdf:
    documentclass: scrreprt
    pdf-engine: lualatex
    top-level-division: chapter
    shift-headings: -1
    title: "FLIM Playground Supplemental Manual"
    author: []
    date: ""
    include-in-header: pdf-title.tex
